<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Scholar Bridge</title>
    
    <!-- 1. CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 2. React & Babel (The Compiler) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Firebase (Browser Version) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        
        // Export to global window so our React script can see it
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <style>
        body { background-color: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- This script tag type="text/babel" is the secret to making it work in the browser -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { getFirestore, doc, setDoc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, initializeApp } = window.FirebaseSDK;

        // --- CONFIG ---
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'elif-scholar-bridge-v1';
        const SECURITY_CONFIG = {
            apiKey: "AIzaSyDObztJxTZqj0wNJ12l888rB1L8mAPicu4", 
            familyPasscode: "1234", 
            appId: appId
        };

        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- UI HELPERS ---
        const StatusItem = ({ label, value }) => (
            <div className="flex justify-between items-center bg-slate-950 p-4 rounded-2xl border border-slate-800">
                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{label}</span>
                <span className="text-xs font-black text-white italic uppercase tracking-tighter">{String(value)}</span>
            </div>
        );

        const App = () => {
            const [isLocked, setIsLocked] = useState(true);
            const [passInput, setPassInput] = useState('');
            const [view, setView] = useState('parent'); 
            const [user, setUser] = useState(null);
            const [curriculum, setCurriculum] = useState({
                reading: "Wild River", math: "Fractions", activeMission: "writing", lastUpdated: "Init...", rules: "Full sentences."
            });
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [lastCode, setLastCode] = useState('----');
            const [isProcessing, setIsProcessing] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            await signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { console.error("Auth Error:", err); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const curriculumRef = doc(db, 'artifacts', SECURITY_CONFIG.appId, 'public', 'data', 'curriculum', 'latest');
                const unsubscribe = onSnapshot(curriculumRef, (docSnap) => {
                    if (docSnap.exists()) setCurriculum(docSnap.data());
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
                if (window.lucide) lucide.createIcons();
            }, [messages, view, isLocked]);

            const handleUnlock = () => {
                if (passInput === SECURITY_CONFIG.familyPasscode) setIsLocked(false);
                else { alert("Incorrect Passcode"); setPassInput(''); }
            };

            const ingestTeacherData = async (rawText) => {
                if (!rawText.trim()) return;
                setIsProcessing(true);
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${SECURITY_CONFIG.apiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: rawText }] }],
                            systemInstruction: { parts: [{ text: `Extract JSON: {"reading": "", "math": "", "activeMission": "writing|math", "rules": ""}` }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const extracted = JSON.parse(data.candidates[0].content.parts[0].text);
                    const curriculumRef = doc(db, 'artifacts', SECURITY_CONFIG.appId, 'public', 'data', 'curriculum', 'latest');
                    await setDoc(curriculumRef, { ...extracted, lastUpdated: new Date().toLocaleString() });
                    alert("Mission Updated.");
                } catch (e) { alert("Update failed."); }
                finally { setIsProcessing(false); }
            };

            const callTutor = async (userMessage) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${SECURITY_CONFIG.apiKey}`;
                const prompt = `Act as Elif's Socratic Mentor. Topic: ${curriculum.reading}. Rules: ${curriculum.rules}. Give code [ELITE-${Math.floor(Math.random()*9000)}] when finished.`;
                const history = messages.map(m => ({ role: m.role === 'ai' ? 'model' : 'user', parts: [{ text: String(m.text) }] }));
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [...history, { role: 'user', parts: [{ text: String(userMessage) }] }],
                            systemInstruction: { parts: [{ text: prompt }] }
                        })
                    });
                    const data = await response.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    const codeMatch = aiText.match(/ELITE-\d+/);
                    if (codeMatch) setLastCode(codeMatch[0]);
                    return aiText;
                } catch (e) { return "Error."; }
            };

            const handleSendChat = async () => {
                if (!input.trim()) return;
                const text = input; setInput('');
                setMessages(p => [...p, { role: 'user', text }]);
                const res = await callTutor(text);
                setMessages(p => [...p, { role: 'ai', text: res }]);
            };

            if (isLocked) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-slate-950">
                        <div className="max-w-xs w-full text-center space-y-8 animate-fade-in">
                            <div className="bg-indigo-600 w-20 h-20 rounded-3xl shadow-2xl flex items-center justify-center mx-auto"><i data-lucide="shield-check" className="text-white w-10 h-10"></i></div>
                            <h1 className="text-2xl font-black italic uppercase text-white tracking-tighter leading-none">Family Lock</h1>
                            <input type="password" value={passInput} onChange={e => setPassInput(e.target.value)} placeholder="PIN" className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-center text-white tracking-[1em] outline-none"/>
                            <button onClick={handleUnlock} className="w-full bg-indigo-600 p-4 rounded-2xl font-black uppercase text-xs text-white">Enter</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen bg-slate-950 text-slate-100 flex flex-col">
                    {view === 'parent' ? (
                        <div className="p-8 space-y-8 overflow-y-auto h-full">
                            <div className="flex justify-between items-center">
                                <h1 className="text-3xl font-black italic uppercase tracking-tighter">Parent Hub</h1>
                                <button onClick={() => setView('student')} className="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">To Student View</button>
                            </div>
                            <div className="space-y-6">
                                <div className="bg-slate-900 p-6 rounded-3xl space-y-4 border border-slate-800">
                                    <h3 className="text-xs font-black uppercase text-indigo-400">Teacher Email Ingestion</h3>
                                    <textarea className="w-full h-40 bg-slate-950 rounded-2xl p-4 text-xs text-white outline-none" placeholder="Paste email here..." onBlur={e => ingestTeacherData(e.target.value)}></textarea>
                                </div>
                                <div className="bg-slate-900 p-6 rounded-3xl space-y-4 border border-slate-800">
                                    <h3 className="text-xs font-black uppercase text-emerald-400">Current Status</h3>
                                    <StatusItem label="Reading" value={curriculum.reading} />
                                    <StatusItem label="Math" value={curriculum.math} />
                                    <StatusItem label="Audit Code" value={lastCode} />
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col h-full bg-black">
                            <header className="p-4 border-b border-slate-900 flex justify-between items-center bg-slate-950">
                                <button onClick={() => setView('parent')} className="text-slate-600"><i data-lucide="rotate-ccw"></i></button>
                                <span className="font-black italic uppercase text-xs tracking-widest">{String(curriculum.reading)}</span>
                                <div className="w-8" />
                            </header>
                            <main className="flex-grow overflow-y-auto p-6 space-y-6 scroll-hide bg-gradient-to-b from-slate-900/20 to-black">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex gap-4 max-w-[90%] ${m.role === 'user' ? 'ml-auto flex-row-reverse' : ''}`}>
                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center shrink-0 ${m.role === 'ai' ? 'bg-indigo-600' : 'bg-slate-800'}`}><i data-lucide={m.role === 'ai' ? "shield-check" : "user"} size={16} className="text-white"></i></div>
                                        <div className={`p-4 rounded-2xl text-sm ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none shadow-xl' : 'bg-slate-900 border border-slate-800 text-slate-100 rounded-tl-none shadow-md'}`}>{String(m.text)}</div>
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </main>
                            <footer className="p-6 bg-slate-950 border-t border-slate-900 flex gap-3">
                                <textarea className="flex-grow bg-slate-900 rounded-2xl p-4 text-sm text-white h-14 resize-none outline-none" placeholder="Reply..." value={input} onChange={e => setInput(e.target.value)} />
                                <button onClick={handleSendChat} className="bg-indigo-600 p-4 rounded-2xl"><i data-lucide="send" className="text-white"></i></button>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
