<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Scholar Bridge</title>
    
    <!-- 1. CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 2. React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Firebase (Browser Version) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        body { background-color: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isLocked, setIsLocked] = useState(true);
            const [passInput, setPassInput] = useState('');
            const [view, setView] = useState('parent'); 
            const [user, setUser] = useState(null);
            const [sdkReady, setSdkReady] = useState(false);
            const [error, setError] = useState(null);
            
            const [curriculum, setCurriculum] = useState({
                reading: "Wild River", math: "Fractions", activeMission: "writing", lastUpdated: "Init...", rules: "Full sentences."
            });
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [lastCode, setLastCode] = useState('----');
            const [isProcessing, setIsProcessing] = useState(false);
            const chatEndRef = useRef(null);

            // --- CONFIGS ---
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'elif-scholar-bridge-v1';
            const apiKey = "AIzaSyDObztJxTZqj0wNJ12l888rB1L8mAPicu4";
            const familyPasscode = "1234";

            useEffect(() => {
                const initBridge = async () => {
                    if (!window.FirebaseSDK) {
                        window.addEventListener('firebase-ready', () => setSdkReady(true));
                        return;
                    }
                    setSdkReady(true);
                };
                initBridge();
            }, []);

            useEffect(() => {
                if (!sdkReady) return;

                const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseSDK;
                
                try {
                    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
                    if (!firebaseConfig.apiKey) {
                        setError("Firebase Configuration Missing. Please check environment variables.");
                        return;
                    }
                    
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);

                    const performAuth = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (err) {
                            console.error("Auth Error:", err);
                            setError("Connection to Secure Bridge failed. Check internet.");
                        }
                    };
                    performAuth();

                    const unsubscribeAuth = onAuthStateChanged(auth, setUser);
                    return () => unsubscribeAuth();
                } catch (e) {
                    setError("System Initialization Error: " + e.message);
                }
            }, [sdkReady]);

            useEffect(() => {
                if (!user || !sdkReady) return;
                const { getFirestore, doc, onSnapshot, initializeApp } = window.FirebaseSDK;
                const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);

                const curriculumRef = doc(db, 'artifacts', appId, 'public', 'data', 'curriculum', 'latest');
                const unsubscribe = onSnapshot(curriculumRef, (docSnap) => {
                    if (docSnap.exists()) setCurriculum(docSnap.data());
                }, (err) => {
                    console.error("Sync Error:", err);
                    if (err.code === 'permission-denied') {
                        setError("Permission Denied: Ensure Firebase Rules are set to allow access to /artifacts/");
                    }
                });
                return () => unsubscribe();
            }, [user, sdkReady]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
                if (window.lucide) lucide.createIcons();
            }, [messages, view, isLocked, sdkReady]);

            const handleUnlock = () => {
                if (passInput === familyPasscode) setIsLocked(false);
                else { alert("Incorrect Passcode"); setPassInput(''); }
            };

            const ingestTeacherData = async (rawText) => {
                if (!rawText.trim() || !user) return;
                setIsProcessing(true);
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: rawText }] }],
                            systemInstruction: { parts: [{ text: `Analyze school email and output ONLY JSON: {"reading": "book", "math": "topic", "activeMission": "writing|math", "rules": "bullet points"}` }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const extracted = JSON.parse(data.candidates[0].content.parts[0].text);
                    
                    const { getFirestore, doc, setDoc, initializeApp } = window.FirebaseSDK;
                    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
                    const app = initializeApp(firebaseConfig);
                    const db = getFirestore(app);
                    
                    const curriculumRef = doc(db, 'artifacts', appId, 'public', 'data', 'curriculum', 'latest');
                    await setDoc(curriculumRef, { ...extracted, lastUpdated: new Date().toLocaleString() });
                    alert("Mission Updated.");
                } catch (e) { alert("Update failed."); }
                finally { setIsProcessing(false); }
            };

            const callTutor = async (userMessage) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const prompt = `Act as Elif's Socratic Mentor. Topic: ${curriculum.reading}. Rules: ${curriculum.rules}. Give code [ELITE-${Math.floor(Math.random()*9000)}] when finished.`;
                const history = messages.map(m => ({ role: m.role === 'ai' ? 'model' : 'user', parts: [{ text: String(m.text) }] }));
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [...history, { role: 'user', parts: [{ text: String(userMessage) }] }],
                            systemInstruction: { parts: [{ text: prompt }] }
                        })
                    });
                    const data = await response.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    const codeMatch = aiText.match(/ELITE-\d+/);
                    if (codeMatch) setLastCode(codeMatch[0]);
                    return aiText;
                } catch (e) { return "Error."; }
            };

            const handleSendChat = async () => {
                if (!input.trim()) return;
                const text = input; setInput('');
                setMessages(p => [...p, { role: 'user', text }]);
                const res = await callTutor(text);
                setMessages(p => [...p, { role: 'ai', text: res }]);
            };

            if (error) {
                return (
                    <div className="h-screen flex items-center justify-center p-8 bg-slate-950 text-center">
                        <div className="space-y-4 max-w-sm">
                            <div className="text-rose-500 mb-4"><i data-lucide="alert-circle" className="w-12 h-12 mx-auto"></i></div>
                            <h2 className="text-xl font-black uppercase text-white">System Offline</h2>
                            <p className="text-slate-400 text-sm leading-relaxed">{error}</p>
                            <button onClick={() => window.location.reload()} className="bg-indigo-600 px-6 py-2 rounded-xl text-xs font-bold uppercase">Retry Connection</button>
                        </div>
                    </div>
                );
            }

            if (!sdkReady || !user) {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-950">
                        <div className="text-center space-y-4">
                            <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                            <p className="text-indigo-400 animate-pulse font-black uppercase text-xs tracking-widest">Securing Bridge...</p>
                        </div>
                    </div>
                );
            }

            if (isLocked) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 bg-slate-950">
                        <div className="max-w-xs w-full text-center space-y-8 animate-fade-in">
                            <div className="bg-indigo-600 w-20 h-20 rounded-3xl shadow-2xl flex items-center justify-center mx-auto"><i data-lucide="shield-check" className="text-white w-10 h-10"></i></div>
                            <h1 className="text-2xl font-black italic uppercase text-white tracking-tighter leading-none">Family Lock</h1>
                            <input type="password" value={passInput} onChange={e => setPassInput(e.target.value)} placeholder="PIN" className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-center text-white tracking-[1em] outline-none"/>
                            <button onClick={handleUnlock} className="w-full bg-indigo-600 p-4 rounded-2xl font-black uppercase text-xs text-white">Enter</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen bg-slate-950 text-slate-100 flex flex-col">
                    {view === 'parent' ? (
                        <div className="p-8 space-y-8 overflow-y-auto h-full scroll-hide animate-fade-in">
                            <div className="flex justify-between items-center">
                                <h1 className="text-3xl font-black italic uppercase tracking-tighter">Parent Hub</h1>
                                <button onClick={() => setView('student')} className="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white">To Student View</button>
                            </div>
                            <div className="space-y-6">
                                <div className="bg-slate-900 p-6 rounded-3xl space-y-4 border border-slate-800 shadow-xl">
                                    <h3 className="text-xs font-black uppercase text-indigo-400">Teacher Email Ingestion</h3>
                                    <textarea className="w-full h-40 bg-slate-950 rounded-2xl p-4 text-xs text-white outline-none focus:border-indigo-500 transition-colors" placeholder="Paste email here..." onBlur={e => ingestTeacherData(e.target.value)}></textarea>
                                </div>
                                <div className="bg-slate-900 p-6 rounded-3xl space-y-4 border border-slate-800 shadow-xl">
                                    <h3 className="text-xs font-black uppercase text-emerald-400">Current Status</h3>
                                    <div className="grid gap-2 text-white">
                                        <div className="flex justify-between p-4 bg-slate-950 rounded-xl border border-slate-800">
                                            <span className="text-[10px] font-black uppercase text-slate-500">Reading</span>
                                            <span className="text-xs font-black italic">{String(curriculum.reading)}</span>
                                        </div>
                                        <div className="flex justify-between p-4 bg-slate-950 rounded-xl border border-slate-800">
                                            <span className="text-[10px] font-black uppercase text-slate-500">Math</span>
                                            <span className="text-xs font-black italic">{String(curriculum.math)}</span>
                                        </div>
                                        <div className="flex justify-between p-4 bg-slate-950 rounded-xl border border-indigo-900/50">
                                            <span className="text-[10px] font-black uppercase text-indigo-400 tracking-widest">Audit Code</span>
                                            <span className="text-xs font-black text-indigo-400 font-mono">{lastCode}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col h-full bg-black animate-fade-in">
                            <header className="p-4 border-b border-slate-900 flex justify-between items-center bg-slate-950">
                                <button onClick={() => setView('parent')} className="text-slate-600 hover:text-white transition-colors"><i data-lucide="rotate-ccw"></i></button>
                                <span className="font-black italic uppercase text-xs tracking-widest text-white">{String(curriculum.reading)} Study</span>
                                <div className="w-8" />
                            </header>
                            <main className="flex-grow overflow-y-auto p-6 space-y-6 scroll-hide bg-gradient-to-b from-slate-900/20 to-black">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex gap-4 max-w-[90%] ${m.role === 'user' ? 'ml-auto flex-row-reverse' : 'animate-fade-in'}`}>
                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center shrink-0 shadow-lg ${m.role === 'ai' ? 'bg-indigo-600' : 'bg-slate-800'}`}><i data-lucide={m.role === 'ai' ? "shield-check" : "user"} size={16} className="text-white"></i></div>
                                        <div className={`p-4 rounded-2xl text-sm leading-relaxed ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none shadow-xl' : 'bg-slate-900 border border-slate-800 text-slate-100 rounded-tl-none shadow-md'}`}>{String(m.text)}</div>
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </main>
                            <footer className="p-6 bg-slate-950 border-t border-slate-900 flex flex-col gap-4">
                                <div className="flex gap-3">
                                    <textarea className="flex-grow bg-slate-900 rounded-2xl p-4 text-sm text-white h-14 resize-none outline-none border border-slate-800 focus:border-indigo-500" placeholder="Submit your scholarly response..." value={input} onChange={e => setInput(e.target.value)} />
                                    <button onClick={handleSendChat} className="bg-indigo-600 p-4 rounded-2xl text-white shadow-xl hover:bg-indigo-500 active:scale-95 transition-all flex items-center justify-center h-14 w-14"><i data-lucide="send"></i></button>
                                </div>
                                <div className="flex justify-between items-center px-2">
                                    <div className="flex flex-col">
                                        <span className="text-[8px] text-slate-600 font-black uppercase tracking-widest italic mb-1">Verification Status</span>
                                        <span className="text-xs font-black text-indigo-400 font-mono tracking-tighter">{String(lastCode)}</span>
                                    </div>
                                    <i data-lucide="lock" className="text-slate-800 w-3 h-3"></i>
                                </div>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
