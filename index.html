```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Scholar Mentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0c0c0e; color: #e4e4e7; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        textarea { caret-color: #6366f1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /**
         * ==========================================
         * MASTER CONFIG - EDIT THIS ON GITHUB
         * ==========================================
         */
        const MASTER_CONFIG = {
            // 1. PASTE YOUR API KEY HERE
            apiKey: "AIzaSyDObztJxTZqj0wNJ12l888rB1L8mAPicu4", 
            
            // 2. PRIMARY MODEL (App will auto-try others if this fails)
            model: "gemini-1.5-flash",

            writing: {
                title: "Wild River (Rodman Philbrick)",
                prompt: `You are Elif’s Ivy League Writing Coach. 
                - Focus ONLY on 'Wild River'. 
                - REJECT answers < 15 words as 'coasting'. 
                - MANDATORY: Restate the question and provide a 'because' statement.
                - CODE: Give [ADJECTIVE-ANIMAL-NUMBER] only after a perfect 5-sentence analysis.`
            },
            
            math: {
                title: "Math Sprint: Fractions & Patterns",
                prompt: `You are Elif’s Elite Math Sensei. 
                - Focus: Mixed/Equivalent fractions and Multiplication patterns.
                - Task: Give 2 multiplication patterns, then 1 fraction comparison.
                - Rule: Require full steps to be shown.
                - CODE: Give [MATH-HERO-NUMBER] only after 10 correct answers in a row.`
            }
        };

        const App = () => {
            const [mission, setMission] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [debugInfo, setDebugInfo] = useState(null);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages, isLoading]);

            const startMission = (type) => {
                setMission(type);
                setDebugInfo(null);
                const welcome = type === 'writing' 
                    ? `Writing Mission Active: ${MASTER_CONFIG.writing.title}. I have your Secret Code ready. Which chapter did you finish?`
                    : `Math Mission Active. Ready for your first set of problems?`;
                setMessages([{ role: 'ai', text: welcome }]);
                setTimeout(() => lucide.createIcons(), 100);
            };

            const callGemini = async (userMessage) => {
                const key = (MASTER_CONFIG.apiKey || "").trim();
                if (!key) throw new Error("MISSING_API_KEY");

                // We try v1beta first as it supports systemInstruction more reliably
                const endpoint = "v1beta";
                
                // We will try these models in order if one fails
                const modelsToTry = [MASTER_CONFIG.model, "gemini-1.5-flash-latest", "gemini-pro"];
                let lastError = "";

                for (let modelName of modelsToTry) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/${endpoint}/models/${modelName}:generateContent?key=${key}`;
                        
                        const contents = [
                            ...messages.map(m => ({ 
                                role: m.role === 'ai' ? 'model' : 'user', 
                                parts: [{ text: m.text }] 
                            })),
                            { role: 'user', parts: [{ text: userMessage }] }
                        ];

                        const payload = {
                            contents: contents,
                            systemInstruction: {
                                parts: [{ text: MASTER_CONFIG[mission].prompt }]
                            }
                        };

                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            return data.candidates[0].content.parts[0].text;
                        } else {
                            // If it's a model not found error, we continue to the next model in the loop
                            if (data.error?.message?.includes('not found')) {
                                lastError = `Model ${modelName} not found. Trying next...`;
                                continue;
                            }
                            throw new Error(data.error?.message || `Error ${response.status}`);
                        }
                    } catch (e) {
                        lastError = e.message;
                        if (e.message.includes("MISSING_API_KEY")) throw e;
                    }
                }
                
                throw new Error(`Connection Failed. Final error: ${lastError}`);
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                const text = input;
                setInput('');
                setDebugInfo(null);
                setMessages(prev => [...prev, { role: 'user', text }]);
                setIsLoading(true);

                try {
                    const res = await callGemini(text);
                    setMessages(prev => [...prev, { role: 'ai', text: res }]);
                } catch (e) {
                    setDebugInfo(e.message);
                } finally {
                    setIsLoading(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            if (!mission) {
                return (
                    <div className="h-screen bg-black flex items-center justify-center p-6 text-white font-sans animate-fade-in">
                        <div className="max-w-xs w-full text-center space-y-10">
                            <div className="bg-indigo-600 w-20 h-20 rounded-3xl shadow-2xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="graduation-cap" className="w-10 h-10"></i>
                            </div>
                            <div className="space-y-2">
                                <h1 className="text-3xl font-black uppercase italic tracking-tighter">Scholar Command</h1>
                                <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.3em]">Select Daily Quest</p>
                            </div>
                            <div className="space-y-4">
                                <button onClick={() => startMission('writing')} className="w-full bg-zinc-900 p-6 rounded-3xl flex justify-between items-center border border-zinc-800 hover:border-indigo-500 transition-all active:scale-95 group">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-zinc-800 p-2 rounded-xl group-hover:bg-indigo-600 transition-colors"><i data-lucide="book-open" className="w-5 h-5"></i></div>
                                        <div className="text-left"><p className="font-black uppercase text-sm italic">Writing Quest</p></div>
                                    </div>
                                    <i data-lucide="chevron-right" className="w-5 h-5 text-zinc-600"></i>
                                </button>
                                <button onClick={() => startMission('math')} className="w-full bg-zinc-900 p-6 rounded-3xl flex justify-between items-center border border-zinc-800 hover:border-emerald-500 transition-all active:scale-95 group">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-zinc-800 p-2 rounded-xl group-hover:bg-emerald-600 transition-colors"><i data-lucide="calculator" className="w-5 h-5"></i></div>
                                        <div className="text-left"><p className="font-black uppercase text-sm italic">Math Sprint</p></div>
                                    </div>
                                    <i data-lucide="chevron-right" className="w-5 h-5 text-zinc-600"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto border-x border-zinc-900 bg-black animate-fade-in">
                    <header className="p-4 border-b border-zinc-900 bg-zinc-950 flex justify-between items-center shrink-0">
                        <button onClick={() => setMission(null)} className="text-zinc-600 hover:text-white p-2"><i data-lucide="rotate-ccw" className="w-5 h-5"></i></button>
                        <div className="text-center">
                            <h1 className="text-[10px] font-black uppercase tracking-widest italic">{mission === 'writing' ? 'Writing Mastery' : 'Math Sprint'}</h1>
                            <span className="text-[8px] text-emerald-500 font-bold uppercase tracking-widest">Engine Active</span>
                        </div>
                        <div className="w-10" />
                    </header>

                    <main className="flex-grow overflow-y-auto p-4 space-y-6 scroll-hide bg-gradient-to-b from-zinc-950 to-black">
                        {messages.map((msg, idx) => (
                            <div key={idx} className={`flex gap-3 max-w-[90%] animate-fade-in ${msg.role === 'user' ? 'ml-auto flex-row-reverse' : ''}`}>
                                <div className={`w-7 h-7 rounded-lg flex items-center justify-center shrink-0 mt-1 shadow-lg ${msg.role === 'ai' ? (mission === 'writing' ? 'bg-indigo-600' : 'bg-emerald-600') : 'bg-zinc-800'}`}>
                                    {msg.role === 'ai' ? <i data-lucide="shield-check" className="w-4 h-4 text-white"></i> : <i data-lucide="user" className="w-4 h-4 text-white"></i>}
                                </div>
                                <div className={`p-3 rounded-2xl text-sm leading-relaxed ${msg.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none shadow-md' : 'bg-zinc-900 border border-zinc-800 text-zinc-200 rounded-tl-none shadow-sm'}`}>
                                    {msg.text.split('\n').map((t, i) => <p key={i} className="mb-2 last:mb-0">{t}</p>)}
                                </div>
                            </div>
                        ))}
                        
                        {isLoading && (
                            <div className="flex gap-1.5 p-4 items-center">
                                <div className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce"></div>
                                <div className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                <div className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                            </div>
                        )}

                        {debugInfo && (
                            <div className="bg-rose-500/10 border border-rose-500/20 p-4 rounded-xl animate-fade-in mx-2">
                                <p className="text-[10px] font-black uppercase text-rose-500 mb-1">Engine Error</p>
                                <p className="text-[11px] text-white font-mono break-words">{debugInfo}</p>
                            </div>
                        )}
                        <div ref={chatEndRef} />
                    </main>

                    <footer className="p-4 bg-zinc-950 border-t border-zinc-900 shrink-0">
                        <div className="flex gap-2 items-center bg-zinc-900 rounded-2xl p-2 border border-zinc-800 focus-within:border-indigo-500 transition-all">
                            <textarea 
                                className="flex-grow bg-transparent border-none focus:ring-0 text-sm p-2 h-10 resize-none placeholder-zinc-700 text-white" 
                                placeholder={mission === 'writing' ? "Analyze text..." : "Submit solution..."} 
                                value={input} 
                                onChange={(e) => setInput(e.target.value)} 
                                onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())}
                            />
                            <button 
                                onClick={handleSend} 
                                disabled={isLoading || !input.trim()} 
                                className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-30 p-2.5 rounded-xl active:scale-95 shadow-lg"
                            >
                                <i data-lucide="send" className="w-5 h-5 text-white"></i>
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>

```
