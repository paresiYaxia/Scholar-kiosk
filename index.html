<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Scholar Bridge</title>
    <!-- Core Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { getFirestore, doc, setDoc, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged, initializeApp } = window.FirebaseSDK;

        // ==========================================
        // 🔑 SECURITY & API CONFIG
        // ==========================================
        const SECURITY_CONFIG = {
            apiKey: "AIzaSyDObztJxTZqj0wNJ12l888rB1L8mAPicu4", 
            familyPasscode: "1234", // Change this to your preferred 4-digit code
            appId: "elif-scholar-bridge-v1"
        };

        // --- FIREBASE INIT ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- SUB-COMPONENTS ---

        const MissionStatus = ({ label, value, highlight }) => (
            <div className={`flex justify-between items-center p-5 rounded-3xl border transition-all ${highlight ? 'bg-indigo-600/10 border-indigo-500/30' : 'bg-slate-950/50 border-white/5'}`}>
                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{String(label)}</span>
                <span className={`text-sm font-black italic uppercase tracking-tight ${highlight ? 'text-indigo-400' : 'text-white'}`}>{String(value)}</span>
            </div>
        );

        const MissionButton = ({ label, iconName, onClick, sub, color }) => {
            const colorMap = {
                indigo: 'hover:border-indigo-500/50 group-hover:bg-indigo-600',
                emerald: 'hover:border-emerald-500/50 group-hover:bg-emerald-600',
                rose: 'hover:border-rose-500/50 group-hover:bg-rose-600'
            };
            return (
                <button onClick={onClick} className={`bg-slate-900/40 backdrop-blur-md border border-slate-800 p-8 rounded-[2.5rem] flex justify-between items-center transition-all active:scale-[0.96] text-left w-full group shadow-2xl ${colorMap[color] || 'hover:border-indigo-500'}`}>
                    <div className="flex items-center gap-6">
                        <div className="bg-slate-800 p-5 rounded-[1.5rem] text-white transition-all shadow-inner">
                            <i data-lucide={iconName}></i>
                        </div>
                        <div>
                            <p className="font-black uppercase text-base italic text-white tracking-tight leading-none mb-1.5">{String(label)}</p>
                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest truncate max-w-[150px] opacity-60">{String(sub)}</p>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" className="text-slate-800 group-hover:text-white transition-all"></i>
                </button>
            );
        };

        // --- MAIN APP ---

        const App = () => {
            const [isLocked, setIsLocked] = useState(true);
            const [passInput, setPassInput] = useState('');
            const [view, setView] = useState('parent'); 
            const [user, setUser] = useState(null);
            const [curriculum, setCurriculum] = useState({
                reading: "Wild River", math: "Fractions", activeMission: "writing", lastUpdated: "Init...", rules: "Full sentences."
            });
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [lastCode, setLastCode] = useState('----');
            const [isProcessing, setIsProcessing] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (!u) signInAnonymously(auth);
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                // Rule 1: Even segments (6)
                const curriculumRef = doc(db, 'artifacts', SECURITY_CONFIG.appId, 'public', 'data', 'curriculum', 'latest');
                const unsubscribe = onSnapshot(curriculumRef, (docSnap) => {
                    if (docSnap.exists()) setCurriculum(docSnap.data());
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
                lucide.createIcons();
            }, [messages, view, isLocked]);

            const handleUnlock = () => {
                if (passInput === SECURITY_CONFIG.familyPasscode) setIsLocked(false);
                else { alert("Incorrect Passcode"); setPassInput(''); }
            };

            const ingestTeacherData = async (rawText) => {
                if (!rawText.trim()) return;
                setIsProcessing(true);
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${SECURITY_CONFIG.apiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: rawText }] }],
                            systemInstruction: { parts: [{ text: `Analyze school email and output ONLY JSON: {"reading": "book title", "math": "topic", "activeMission": "writing|math", "rules": "bullet points"}` }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const extracted = JSON.parse(data.candidates[0].content.parts[0].text);
                    const curriculumRef = doc(db, 'artifacts', SECURITY_CONFIG.appId, 'public', 'data', 'curriculum', 'latest');
                    await setDoc(curriculumRef, { ...extracted, lastUpdated: new Date().toLocaleString() });
                    alert("System Synced Successfully.");
                } catch (e) { alert("Extraction failed."); }
                finally { setIsProcessing(false); }
            };

            const callTutor = async (userMessage, missionType) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${SECURITY_CONFIG.apiKey}`;
                const prompt = `Act as Elif's Socratic Mentor. MISSION: ${missionType === 'writing' ? curriculum.reading : curriculum.math}. RULES: ${curriculum.rules}. NEVER give answers. Require 15+ words. Provide code [ELITE-${String(missionType).toUpperCase()}-${Math.floor(Math.random()*9000)}] when satisfied.`;
                
                const history = messages.map(m => ({ role: m.role === 'ai' ? 'model' : 'user', parts: [{ text: String(m.text) }] }));
                
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [...history, { role: 'user', parts: [{ text: String(userMessage) }] }],
                            systemInstruction: { parts: [{ text: prompt }] }
                        })
                    });
                    const data = await response.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    const codeMatch = aiText.match(/ELITE-[A-Z]+-\d+/);
                    if (codeMatch) setLastCode(codeMatch[0]);
                    return aiText;
                } catch (e) { return "Interruption in logic stream. Please try again."; }
            };

            const handleSendChat = async () => {
                if (!input.trim()) return;
                const text = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', text }]);
                const res = await callTutor(text, curriculum.activeMission);
                setMessages(prev => [...prev, { role: 'ai', text: res }]);
            };

            if (isLocked) {
                return (
                    <div className="h-screen flex items-center justify-center p-6 animate-fade-in">
                        <div className="max-w-xs w-full text-center space-y-8">
                            <div className="bg-indigo-600 w-20 h-20 rounded-3xl shadow-2xl flex items-center justify-center mx-auto"><i data-lucide="shield-check" className="text-white w-10 h-10"></i></div>
                            <h1 className="text-2xl font-black italic uppercase tracking-tighter">Elite Bridge Locked</h1>
                            <input type="password" value={passInput} onChange={e => setPassInput(e.target.value)} placeholder="PIN" className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-center text-white tracking-[1em] outline-none focus:border-indigo-500 transition-all"/>
                            <button onClick={handleUnlock} className="w-full bg-indigo-600 p-4 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition-all shadow-xl shadow-indigo-600/20">Establish Secure Connection</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen bg-slate-950 text-slate-100 overflow-hidden relative">
                    {view === 'parent' ? (
                        <div className="max-w-4xl mx-auto p-8 space-y-10 h-screen overflow-y-auto scroll-hide animate-fade-in">
                            <header className="flex justify-between items-center">
                                <div><h1 className="text-4xl font-black italic uppercase tracking-tighter">Parent Hub</h1><p className="text-[10px] text-indigo-400 font-black uppercase mt-1">Systems Audit</p></div>
                                <button onClick={() => setView('student')} className="bg-indigo-600 px-6 py-3 rounded-xl text-[10px] font-black uppercase shadow-xl hover:bg-indigo-500 active:scale-95 transition-all">Student View</button>
                            </header>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <section className="bg-slate-900/50 border border-slate-800 p-8 rounded-[2.5rem] space-y-6 shadow-2xl">
                                    <div className="flex items-center gap-3 text-indigo-400 font-black uppercase text-xs tracking-widest"><i data-lucide="mail"></i> 1. Feed the Engine</div>
                                    <textarea className="w-full h-48 bg-slate-950 border border-slate-800 rounded-3xl p-6 text-xs text-white outline-none focus:border-indigo-500 transition-colors resize-none" placeholder="Paste school email here..." onBlur={(e) => ingestTeacherData(e.target.value)}></textarea>
                                    {isProcessing && <div className="text-indigo-400 text-[10px] font-black animate-pulse uppercase italic">Synchronizing Cloud Data...</div>}
                                </section>
                                <section className="bg-slate-900/50 border border-slate-800 p-8 rounded-[2.5rem] space-y-6 shadow-2xl">
                                    <div className="flex items-center gap-3 text-emerald-400 font-black uppercase text-xs tracking-widest"><i data-lucide="layout-dashboard"></i> 2. Current Status</div>
                                    <div className="space-y-4">
                                        <MissionStatus label="Reading" value={curriculum.reading} />
                                        <MissionStatus label="Math" value={curriculum.math} />
                                        <MissionStatus label="Audit Code" value={lastCode} highlight />
                                    </div>
                                </section>
                            </div>
                        </div>
                    ) : (
                        <div className="h-screen bg-black flex flex-col relative overflow-hidden animate-fade-in">
                            <header className="p-6 bg-slate-950 border-b border-slate-800 flex justify-between items-center z-10 shadow-2xl">
                                <button onClick={() => setView('parent')} className="text-slate-600 hover:text-white transition-all p-3"><i data-lucide="rotate-ccw"></i></button>
                                <div className="text-center">
                                    <h2 className="text-white font-black italic uppercase text-sm tracking-tighter tracking-[0.2em]">Scholar Kiosk</h2>
                                    <div className="flex items-center gap-1.5 justify-center mt-1">
                                        <div className="w-1 h-1 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
                                        <span className="text-[8px] text-emerald-500 font-black uppercase tracking-widest">{curriculum.reading} Active</span>
                                    </div>
                                </div>
                                <div className="w-10" />
                            </header>
                            <main className="flex-grow overflow-y-auto p-8 space-y-10 bg-gradient-to-b from-slate-900/20 to-black scroll-hide">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex gap-5 max-w-[92%] ${m.role === 'user' ? 'ml-auto flex-row-reverse' : ''}`}>
                                        <div className={`w-10 h-10 rounded-2xl flex items-center justify-center shrink-0 shadow-2xl ${m.role === 'ai' ? 'bg-indigo-600' : 'bg-slate-800'}`}><i data-lucide={m.role === 'ai' ? "shield-check" : "user"}></i></div>
                                        <div className={`p-6 rounded-[2.5rem] text-[15px] leading-relaxed tracking-tight shadow-2xl ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none border border-indigo-400/20' : 'bg-slate-900/80 backdrop-blur-md border border-slate-800 text-slate-100 rounded-tl-none'}`}>{m.text}</div>
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </main>
                            <footer className="p-10 border-t border-slate-900 bg-slate-950/90 backdrop-blur-2xl flex flex-col gap-6">
                                <div className="flex gap-4 items-end">
                                    <div className="flex-grow bg-slate-900/80 p-3 rounded-[2.5rem] border border-slate-800 focus-within:border-indigo-500/50 transition-all shadow-inner relative">
                                        <textarea className="w-full bg-transparent p-4 text-sm text-white outline-none resize-none h-16 leading-relaxed scroll-hide" placeholder="Submit analysis..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSendChat())}></textarea>
                                    </div>
                                    <button onClick={handleSendChat} className="bg-indigo-600 p-6 rounded-[2rem] text-white shadow-2xl h-16 w-16 flex items-center justify-center hover:bg-indigo-500 transition-all active:scale-90"><i data-lucide="send"></i></button>
                                </div>
                                <div className="flex justify-between items-center px-4">
                                    <div className="flex flex-col">
                                        <span className="text-[9px] text-slate-600 font-black uppercase tracking-widest italic mb-1">Verification Code</span>
                                        <span className="text-sm font-black text-indigo-400 font-mono tracking-tighter">{String(lastCode)}</span>
                                    </div>
                                    <i data-lucide="lock" className="text-slate-800"></i>
                                </div>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
