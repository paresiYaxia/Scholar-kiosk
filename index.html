<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Scholar Bridge</title>
    
    <!-- 1. CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 2. React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 3. Firebase (Browser Version) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        body { background-color: #020617; color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 🔑 MASTER CONFIGURATION
        // ==========================================
        const CONFIG = {
            // 1. Gemini API Key
            geminiApiKey: "AIzaSyDObztJxTZqj0wNJ12l888rB1L8mAPicu4",

            // 2. Your NEW Firebase Config
            firebaseConfig: {
                apiKey: "AIzaSyCa4hJTVdcpfh7bY-4GHAk046wNgqthAMQ",
                authDomain: "scholar-bridge-6696c.firebaseapp.com",
                projectId: "scholar-bridge-6696c",
                storageBucket: "scholar-bridge-6696c.firebasestorage.app",
                messagingSenderId: "833121444707",
                appId: "1:833121444707:web:1eedf228241d7c5d0f6956"
            },

            // 3. App Settings
            familyPasscode: "1234",
            appId: "scholar-bridge-6696c" // Using your Project ID as the App ID
        };
        // ==========================================

        const App = () => {
            const [isLocked, setIsLocked] = useState(true);
            const [passInput, setPassInput] = useState('');
            const [view, setView] = useState('parent'); 
            const [user, setUser] = useState(null);
            const [sdkReady, setSdkReady] = useState(false);
            const [error, setError] = useState(null);
            
            const [curriculum, setCurriculum] = useState({
                reading: "Wild River", math: "Fractions", activeMission: "writing", lastUpdated: "Init...", rules: "Full sentences."
            });
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [lastCode, setLastCode] = useState('----');
            const [isProcessing, setIsProcessing] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                const initBridge = () => {
                    if (window.FirebaseSDK) setSdkReady(true);
                    else window.addEventListener('firebase-ready', () => setSdkReady(true));
                };
                initBridge();
            }, []);

            useEffect(() => {
                if (!sdkReady) return;
                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                try {
                    const app = initializeApp(CONFIG.firebaseConfig);
                    const auth = getAuth(app);
                    signInAnonymously(auth).catch(err => setError("Auth Fail: " + err.message));
                    return onAuthStateChanged(auth, setUser);
                } catch (e) { setError("Init Error: " + e.message); }
            }, [sdkReady]);

            useEffect(() => {
                if (!user || !sdkReady) return;
                const { getFirestore, doc, onSnapshot, initializeApp } = window.FirebaseSDK;
                const app = initializeApp(CONFIG.firebaseConfig);
                const db = getFirestore(app);

                const curriculumRef = doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'curriculum', 'latest');
                const unsubscribe = onSnapshot(curriculumRef, (docSnap) => {
                    if (docSnap.exists()) setCurriculum(docSnap.data());
                }, (err) => {
                    if (err.code === 'permission-denied') setError("Permission Denied: Go to Firebase Console and Enable Firestore & Set Rules to Public.");
                });
                return () => unsubscribe();
            }, [user, sdkReady]);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
                if (window.lucide) lucide.createIcons();
            }, [messages, view, isLocked, sdkReady]);

            const handleUnlock = () => {
                if (passInput === CONFIG.familyPasscode) setIsLocked(false);
                else { alert("Incorrect Passcode"); setPassInput(''); }
            };

            const ingestTeacherData = async (rawText) => {
                if (!rawText.trim() || !user) return;
                setIsProcessing(true);
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${CONFIG.geminiApiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: rawText }] }],
                            systemInstruction: { parts: [{ text: `Analyze email and output JSON: {"reading": "book", "math": "topic", "activeMission": "writing|math", "rules": "bullets"}` }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const extracted = JSON.parse(data.candidates[0].content.parts[0].text);
                    const { getFirestore, doc, setDoc, initializeApp } = window.FirebaseSDK;
                    const db = getFirestore(initializeApp(CONFIG.firebaseConfig));
                    await setDoc(doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'curriculum', 'latest'), { ...extracted, lastUpdated: new Date().toLocaleString() });
                    alert("Mission Updated.");
                } catch (e) { alert("Update failed: " + e.message); }
                finally { setIsProcessing(false); }
            };

            const callTutor = async (userMessage) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${CONFIG.geminiApiKey}`;
                const prompt = `Act as Elif's Socratic Mentor. Topic: ${curriculum.reading}. Rules: ${curriculum.rules}. Give code [ELITE-${Math.floor(Math.random()*9000)}] when finished.`;
                const history = messages.map(m => ({ role: m.role === 'ai' ? 'model' : 'user', parts: [{ text: String(m.text) }] }));
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [...history, { role: 'user', parts: [{ text: String(userMessage) }] }],
                            systemInstruction: { parts: [{ text: prompt }] }
                        })
                    });
                    const data = await response.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    const codeMatch = aiText.match(/ELITE-\d+/);
                    if (codeMatch) setLastCode(codeMatch[0]);
                    return aiText;
                } catch (e) { return "Logic timeout. Try again."; }
            };

            const handleSendChat = async () => {
                if (!input.trim()) return;
                const text = input; setInput('');
                setMessages(p => [...p, { role: 'user', text }]);
                const res = await callTutor(text);
                setMessages(p => [...p, { role: 'ai', text: res }]);
            };

            if (error) return (
                <div className="h-screen flex items-center justify-center p-8 bg-slate-950 text-center">
                    <div className="space-y-4 max-w-sm">
                        <div className="text-rose-500 mb-4"><i data-lucide="alert-circle" className="w-12 h-12 mx-auto"></i></div>
                        <h2 className="text-xl font-black uppercase text-white tracking-tighter">System Error</h2>
                        <p className="text-slate-400 text-xs leading-relaxed">{error}</p>
                        <button onClick={() => window.location.reload()} className="bg-indigo-600 px-8 py-3 rounded-2xl text-[10px] font-black uppercase text-white shadow-xl shadow-indigo-500/20 active:scale-95">Re-establish Bridge</button>
                    </div>
                </div>
            );

            if (!sdkReady || !user) return (
                <div className="h-screen flex items-center justify-center bg-slate-950">
                    <div className="text-center space-y-4">
                        <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                        <p className="text-indigo-400 animate-pulse font-black uppercase text-xs tracking-widest">Securing Cloud Link...</p>
                    </div>
                </div>
            );

            if (isLocked) return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-950">
                    <div className="max-w-xs w-full text-center space-y-8 animate-fade-in">
                        <div className="bg-indigo-600 w-20 h-20 rounded-3xl shadow-2xl flex items-center justify-center mx-auto shadow-indigo-500/20"><i data-lucide="shield-check" className="text-white w-10 h-10"></i></div>
                        <h1 className="text-3xl font-black italic uppercase text-white tracking-tighter">Elite Bridge</h1>
                        <input type="password" value={passInput} onChange={e => setPassInput(e.target.value)} placeholder="PIN" className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-center text-white tracking-[1em] outline-none focus:border-indigo-500 transition-all"/>
                        <button onClick={handleUnlock} className="w-full bg-indigo-600 p-4 rounded-2xl font-black uppercase text-xs text-white shadow-lg active:scale-95">Enter</button>
                    </div>
                </div>
            );

            return (
                <div className="h-screen bg-slate-950 text-slate-100 flex flex-col">
                    {view === 'parent' ? (
                        <div className="p-8 space-y-8 overflow-y-auto h-full scroll-hide animate-fade-in max-w-4xl mx-auto w-full">
                            <div className="flex justify-between items-center">
                                <h1 className="text-4xl font-black italic uppercase tracking-tighter">Parent Hub</h1>
                                <button onClick={() => setView('student')} className="bg-indigo-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white active:scale-95">Student View</button>
                            </div>
                            <div className="space-y-6">
                                <div className="bg-slate-900 p-8 rounded-[2.5rem] space-y-6 border border-slate-800 shadow-2xl">
                                    <h3 className="text-[10px] font-black uppercase text-indigo-400 tracking-widest italic">1. Mission Ingestion</h3>
                                    <textarea className="w-full h-40 bg-slate-950 rounded-3xl p-6 text-sm text-white outline-none focus:border-indigo-500 transition-colors border border-slate-800 resize-none shadow-inner" placeholder="Paste latest school email or debate topic..." onBlur={e => ingestTeacherData(e.target.value)}></textarea>
                                    {isProcessing && <p className="text-indigo-400 text-[10px] font-black animate-pulse uppercase">AI Analyzing Curriculum...</p>}
                                </div>
                                <div className="bg-slate-900 p-8 rounded-[2.5rem] space-y-4 border border-slate-800 shadow-2xl">
                                    <h3 className="text-[10px] font-black uppercase text-emerald-400 tracking-widest italic">2. Current Cloud Status</h3>
                                    <div className="space-y-2">
                                        <div className="flex justify-between p-5 bg-slate-950 rounded-2xl border border-slate-800 shadow-inner">
                                            <span className="text-[10px] font-black uppercase text-slate-500">Reading</span>
                                            <span className="text-sm font-black italic text-white">{String(curriculum.reading)}</span>
                                        </div>
                                        <div className="flex justify-between p-5 bg-slate-950 rounded-2xl border border-slate-800 shadow-inner">
                                            <span className="text-[10px] font-black uppercase text-slate-500">Audit Code</span>
                                            <span className="text-sm font-black text-indigo-400 font-mono tracking-widest">{lastCode}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex flex-col h-full bg-black animate-fade-in">
                            <header className="p-6 border-b border-slate-900 flex justify-between items-center bg-slate-950/80 backdrop-blur-xl z-10">
                                <button onClick={() => setView('parent')} className="text-slate-600 hover:text-white transition-colors active:scale-110"><i data-lucide="rotate-ccw"></i></button>
                                <div className="text-center">
                                    <h2 className="text-white font-black italic uppercase text-sm tracking-tighter">Elite Scholar Kiosk</h2>
                                    <div className="flex items-center gap-1.5 justify-center mt-0.5 opacity-60">
                                        <div className="w-1 h-1 bg-emerald-500 rounded-full animate-pulse"></div>
                                        <span className="text-[8px] text-emerald-500 font-black uppercase">{String(curriculum.reading)} Session</span>
                                    </div>
                                </div>
                                <div className="w-8" />
                            </header>
                            <main className="flex-grow overflow-y-auto p-6 space-y-8 bg-[radial-gradient(circle_at_top,_rgba(31,41,55,0.2),_rgba(0,0,0,1))] scroll-hide">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex gap-4 max-w-[92%] ${m.role === 'user' ? 'ml-auto flex-row-reverse animate-in slide-in-from-right-2' : 'animate-in slide-in-from-left-2'}`}>
                                        <div className={`w-9 h-9 rounded-xl flex items-center justify-center shrink-0 shadow-2xl ${m.role === 'ai' ? 'bg-indigo-600 border border-indigo-400/20 shadow-indigo-500/20' : 'bg-slate-800 border border-slate-700'}`}>
                                            <i data-lucide={m.role === 'ai' ? "shield-check" : "user"} size={20} className="text-white"></i>
                                        </div>
                                        <div className={`p-5 rounded-[2rem] text-sm leading-relaxed tracking-tight shadow-2xl ${m.role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none border border-indigo-400' : 'bg-slate-900/50 backdrop-blur-md border border-slate-800 text-slate-100 rounded-tl-none'}`}>{String(m.text)}</div>
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </main>
                            <footer className="p-8 bg-slate-950/80 backdrop-blur-2xl border-t border-slate-900 flex flex-col gap-6 shadow-2xl">
                                <div className="flex gap-4 items-end">
                                    <div className="flex-grow bg-slate-900/80 p-3 rounded-[2.5rem] border border-slate-800 focus-within:border-indigo-500/50 transition-all shadow-inner">
                                        <textarea className="w-full bg-transparent p-4 text-sm text-white outline-none resize-none h-16 leading-relaxed scroll-hide" placeholder="Submit logic..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSendChat())}></textarea>
                                    </div>
                                    <button onClick={handleSendChat} className="bg-indigo-600 p-6 rounded-[2rem] text-white shadow-2xl shadow-indigo-500/20 active:scale-90 h-16 w-16 flex items-center justify-center transition-all"><i data-lucide="send" size={24}></i></button>
                                </div>
                                <div className="flex justify-between items-center px-4">
                                    <div className="flex flex-col">
                                        <span className="text-[9px] text-slate-600 font-black uppercase tracking-widest italic mb-1">Verification Status</span>
                                        <span className="text-sm font-black text-indigo-400 font-mono tracking-tighter shadow-md drop-shadow-lg">{String(lastCode)}</span>
                                    </div>
                                    <i data-lucide="lock" className="text-slate-800"></i>
                                </div>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
